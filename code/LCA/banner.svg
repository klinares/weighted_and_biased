<svg viewBox="0 0 1200 350" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d1038"/>
      <stop offset="0.55" stop-color="#162640"/>
      <stop offset="1" stop-color="#0c2c3d"/>
    </linearGradient>
    <linearGradient id="viridis" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#440154"/>
      <stop offset="0.35" stop-color="#31688e"/>
      <stop offset="0.7" stop-color="#35b779"/>
      <stop offset="1" stop-color="#fde725"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="350" rx="20" fill="url(#bg)"/>

  <!-- ===================== TITLE BLOCK ===================== -->
  <text x="56" y="120" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="56" font-weight="700" fill="#fde725" letter-spacing="-1">weighted_and_biased</text>
  <rect x="58" y="134" width="600" height="5" rx="2.5" fill="url(#viridis)"/>

  <text x="58" y="172" font-size="22" font-weight="600" fill="#e6e6f7">Design-weighted latent class analysis for complex survey data,</text>
  <text x="58" y="200" font-size="20" fill="#a9b0db">with design-based uncertainty, not the simple-random-sample kind.</text>

  <text x="58" y="248" font-size="19" font-style="italic" fill="#62d28f">Weights say who the population is.</text>
  <text x="58" y="274" font-size="19" font-style="italic" fill="#62d28f">The design says how sure you are allowed to feel.</text>

  <!-- ===================== LATENT CLASSES (ghosts) ===================== -->
  <g>
    <rect x="690" y="200" width="172" height="112" rx="12" fill="none"
          stroke="#7d7daf" stroke-width="1.5" stroke-dasharray="6 5"/>
    <circle cx="737" cy="246" r="27" fill="#6a32a6" opacity="0.6"/>
    <circle cx="776" cy="246" r="27" fill="#1f9a8f" opacity="0.6"/>
    <circle cx="815" cy="246" r="27" fill="#d8c41f" opacity="0.6"/>
    <text x="737" y="256" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">?</text>
    <text x="776" y="256" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">?</text>
    <text x="815" y="256" font-size="28" font-weight="700" fill="#0e1c2e" text-anchor="middle">?</text>
    <text x="776" y="300" font-size="13.5" fill="#c4c4e4" text-anchor="middle">latent classes (unobserved, obviously)</text>
  </g>

  <!-- ===================== BALANCE SCALE: weighted + biased ===================== -->
  <g stroke-linecap="round">
    <!-- stand -->
    <ellipse cx="940" cy="304" rx="48" ry="9" fill="#d3d3ec"/>
    <rect x="908" y="296" width="64" height="9" rx="4" fill="#d3d3ec"/>
    <line x1="940" y1="300" x2="940" y2="128" stroke="#d3d3ec" stroke-width="5"/>
    <!-- fulcrum -->
    <polygon points="940,116 929,132 951,132" fill="#fde725"/>
    <!-- beam (tilted: left side heavy and low) -->
    <line x1="842" y1="151" x2="1038" y2="105" stroke="#ececf6" stroke-width="7"/>

    <!-- LEFT pan (low) carrying the heavy respondents -->
    <line x1="842" y1="151" x2="814" y2="208" stroke="#9a9ac4" stroke-width="2"/>
    <line x1="842" y1="151" x2="870" y2="208" stroke="#9a9ac4" stroke-width="2"/>
    <path d="M 808 208 Q 842 236 876 208" fill="none" stroke="#ececf6" stroke-width="3"/>
    <line x1="808" y1="208" x2="876" y2="208" stroke="#ececf6" stroke-width="2"/>
    <circle cx="831" cy="199" r="15" fill="#6a32a6"/>
    <circle cx="854" cy="199" r="15" fill="#279f99"/>

    <!-- RIGHT pan (high) carrying the light respondents -->
    <line x1="1038" y1="105" x2="1012" y2="166" stroke="#9a9ac4" stroke-width="2"/>
    <line x1="1038" y1="105" x2="1064" y2="166" stroke="#9a9ac4" stroke-width="2"/>
    <path d="M 1006 166 Q 1038 192 1070 166" fill="none" stroke="#ececf6" stroke-width="3"/>
    <line x1="1006" y1="166" x2="1070" y2="166" stroke="#ececf6" stroke-width="2"/>
    <circle cx="1022" cy="158" r="9" fill="#d8c41f"/>
    <circle cx="1038" cy="158" r="9" fill="#35b779"/>
    <circle cx="1054" cy="158" r="9" fill="#31688e"/>
  </g>

  <!-- caption -->
  <text x="940" y="338" font-size="18" font-weight="700" fill="#fde725" text-anchor="middle">weighted &#10003;  and  biased &#10003;  (by design)</text>
</svg>
